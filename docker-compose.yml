services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: subasta_pokemon
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    # Sin exponer 3306 al host para evitar conflicto con MySQL local. Backend accede por red interna.
    # Para conectar desde el host, descomenta: ports: - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: subasta_pokemon
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      APP_URL: http://localhost:8000
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./FrontPKMNTCG
      dockerfile: Dockerfile
      args:
        # URL del backend tal como la verá el navegador (mismo host: puerto del backend)
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mysql_data:
