services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: subasta_pokemon
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: .
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: subasta_pokemon
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      APP_URL: ${APP_URL:-http://localhost:8000}
      ARTISAN_SEED: ${ARTISAN_SEED:-1}
      AI_PYTHON_PATH: "/app/ai model/.venv/bin/python3"
      TCGDEX_SSL_VERIFY: ${TCGDEX_SSL_VERIFY:-true}
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "artisan", "route:list", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./FrontPKMNTCG
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
